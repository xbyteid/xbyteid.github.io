<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | xbyteid</title>
<meta name="theme-color" content="#0a0a0b">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --border: #1e1e24;
  --text: #e4e4e7;
  --text-dim: #71717a;
  --text-muted: #52525b;
  --accent: #3b82f6;
  --font-sans: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.mesh-bg {
  position: fixed;
  inset: -80px;
  background:
    radial-gradient(circle at 30% 40%, rgba(59,130,246,0.06) 0%, transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(59,130,246,0.04) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.container {
  text-align: center;
  position: relative;
  z-index: 1;
  max-width: 480px;
  padding: 0 24px;
}

.error-code {
  font-family: var(--font-mono);
  font-size: clamp(5rem, 18vw, 8rem);
  font-weight: 700;
  letter-spacing: -0.04em;
  color: var(--text);
  line-height: 1;
  margin-bottom: 16px;
}

.error-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.error-desc {
  font-size: 0.95rem;
  color: var(--text-dim);
  line-height: 1.65;
  margin-bottom: 32px;
}

.home-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--accent);
  border-radius: 8px;
  color: #fff;
  font-size: 0.9rem;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.2s, transform 0.2s;
}

.home-link:hover {
  background: #60a5fa;
  transform: translateY(-1px);
  color: #fff;
}

.secondary-links {
  margin-top: 24px;
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.secondary-links a {
  font-size: 0.85rem;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.secondary-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="mesh-bg"></div>

<div class="container">
  <div class="error-code">404</div>
  <h1 class="error-title">Page not found</h1>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="home-link">← Back to Home</a>
  <div class="secondary-links">
    <a href="/blog/">Blog</a>
    <a href="/about.html">About</a>
    <a href="/#contact">Contact</a>
  </div>
</div>

</body>
</html>
